tables:
  - name: dbo.FactInternetSales
    business_name: Internet Sales
    domain: sales
    subject_area: transactions
    description: Internet sales fact table. One row per internet sales order line.
    grain: sales order line
    allowed_for_ai: true
    default_date_column: OrderDate

  - name: dbo.FactResellerSales
    business_name: Reseller Sales
    domain: sales
    subject_area: transactions
    description: Reseller sales fact table. One row per reseller sales order line.
    grain: reseller sales order line
    allowed_for_ai: true
    default_date_column: OrderDate

  - name: dbo.FactSalesQuota
    business_name: Sales Quotas
    domain: sales
    subject_area: quotas
    description: Sales quota facts by employee and date.
    grain: sales quota period by employee
    allowed_for_ai: true
    default_date_column: Date

  - name: dbo.FactCurrencyRate
    business_name: Currency Rates
    domain: finance
    subject_area: currency
    description: Currency exchange rates by date and currency.
    grain: currency rate by day
    allowed_for_ai: true
    default_date_column: Date

  - name: dbo.FactFinance
    business_name: Finance
    domain: finance
    subject_area: accounting
    description: Financial fact table for accounts, organizations, departments, scenarios, and amounts.
    grain: financial amount by account, organization, department, scenario, and date
    allowed_for_ai: true
    default_date_column: Date

  - name: dbo.FactProductInventory
    business_name: Product Inventory
    domain: inventory
    subject_area: stock
    description: Product inventory balances by product and date.
    grain: inventory snapshot by product and date
    allowed_for_ai: true
    default_date_column: Date

  - name: dbo.FactCallCenter
    business_name: Call Center Operations
    domain: operations
    subject_area: call_center
    description: Call center operational facts including calls, service grade, wait time, and issue handling.
    grain: call center shift or day
    allowed_for_ai: true
    default_date_column: Date

  - name: dbo.FactSurveyResponse
    business_name: Survey Responses
    domain: customer
    subject_area: survey
    description: Customer survey response facts.
    grain: survey response
    allowed_for_ai: true
    pii_level: moderate

  - name: dbo.FactAdditionalInternationalProductDescription
    business_name: International Product Descriptions
    domain: product
    subject_area: localization
    description: Additional translated product descriptions.
    grain: product description by culture
    allowed_for_ai: true

  - name: dbo.DimProduct
    business_name: Products
    domain: product
    subject_area: product_catalog
    description: Product dimension with product names, pricing, style, color, size, status, and subcategory.
    grain: one row per product
    allowed_for_ai: true

  - name: dbo.DimProductSubcategory
    business_name: Product Subcategories
    domain: product
    subject_area: product_catalog
    description: Product subcategory dimension.
    grain: one row per product subcategory
    allowed_for_ai: true

  - name: dbo.DimProductCategory
    business_name: Product Categories
    domain: product
    subject_area: product_catalog
    description: Product category dimension.
    grain: one row per product category
    allowed_for_ai: true

  - name: dbo.DimCustomer
    business_name: Customers
    domain: customer
    subject_area: customer_profile
    description: Customer dimension containing demographics, name fields, income, education, marital status, and geography.
    grain: one row per customer
    allowed_for_ai: true
    pii_level: moderate

  - name: dbo.DimGeography
    business_name: Geography
    domain: geography
    subject_area: location
    description: Geographic dimension with city, state/province, country/region, postal code, and sales territory.
    grain: one row per geography location
    allowed_for_ai: true

  - name: dbo.DimSalesTerritory
    business_name: Sales Territories
    domain: geography
    subject_area: sales_territory
    description: Sales territory dimension with region, country, and group.
    grain: one row per sales territory
    allowed_for_ai: true

  - name: dbo.DimDate
    business_name: Dates
    domain: time
    subject_area: calendar
    description: Date dimension with day, week, month, quarter, semester, fiscal, and calendar attributes.
    grain: one row per date
    allowed_for_ai: true

  - name: dbo.DimEmployee
    business_name: Employees
    domain: workforce
    subject_area: employee_profile
    description: Employee dimension with job, department, manager, hire date, status, and workforce attributes.
    grain: one row per employee
    allowed_for_ai: true
    pii_level: restricted
    default_date_column: HireDate

  - name: dbo.DimReseller
    business_name: Resellers
    domain: reseller
    subject_area: reseller_profile
    description: Reseller dimension with business type, reseller name, geography, sales data, and order frequency.
    grain: one row per reseller
    allowed_for_ai: true

  - name: dbo.DimPromotion
    business_name: Promotions
    domain: marketing
    subject_area: promotion
    description: Promotion dimension with discount, promotion type, category, and campaign timing.
    grain: one row per promotion
    allowed_for_ai: true

  - name: dbo.DimSalesReason
    business_name: Sales Reasons
    domain: sales
    subject_area: sales_reason
    description: Sales reason dimension explaining why a sale occurred.
    grain: one row per sales reason
    allowed_for_ai: true

  - name: dbo.DimCurrency
    business_name: Currencies
    domain: finance
    subject_area: currency
    description: Currency dimension with currency alternate key and name.
    grain: one row per currency
    allowed_for_ai: true

  - name: dbo.DimAccount
    business_name: Accounts
    domain: finance
    subject_area: accounting
    description: Financial account dimension.
    grain: one row per financial account
    allowed_for_ai: true

  - name: dbo.DimDepartmentGroup
    business_name: Department Groups
    domain: organization
    subject_area: department
    description: Department hierarchy dimension used by finance and organization reporting.
    grain: one row per department group
    allowed_for_ai: true

  - name: dbo.DimOrganization
    business_name: Organizations
    domain: organization
    subject_area: organization_structure
    description: Organization dimension with organization hierarchy, currency, and parent organization.
    grain: one row per organization
    allowed_for_ai: true

  - name: dbo.DimScenario
    business_name: Scenarios
    domain: finance
    subject_area: planning
    description: Scenario dimension used for actual, budget, and forecast style financial analysis.
    grain: one row per scenario
    allowed_for_ai: true


metrics:
  # =====================================================
  # Internet Sales Metrics
  # =====================================================
  - name: internet_total_revenue
    business_name: Internet total revenue
    description: Total revenue from internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.SalesAmount)
    default_alias: internet_total_revenue
    semantic_type: money
    synonyms:
      - internet revenue
      - online revenue
      - internet sales
      - online sales
      - ecommerce revenue

  - name: internet_total_orders
    business_name: Internet total orders
    description: Total number of internet sales order lines.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: COUNT_BIG(*)
    default_alias: internet_total_orders
    semantic_type: count
    synonyms:
      - internet orders
      - online orders
      - ecommerce orders
      - order count

  - name: internet_average_order_value
    business_name: Internet average order value
    description: Average sales amount for internet sales order lines.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: AVG(f.SalesAmount)
    default_alias: internet_average_order_value
    semantic_type: money
    synonyms:
      - internet aov
      - online average order value
      - average internet sale
      - average order value

  - name: internet_total_quantity
    business_name: Internet total quantity sold
    description: Total quantity sold through internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.OrderQuantity)
    default_alias: internet_total_quantity
    semantic_type: numeric
    synonyms:
      - internet units sold
      - online quantity
      - online volume
      - units sold

  - name: internet_total_discount
    business_name: Internet total discount
    description: Total discount amount for internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.DiscountAmount)
    default_alias: internet_total_discount
    semantic_type: money
    synonyms:
      - internet discount
      - discount amount
      - online discounts

  - name: internet_total_tax
    business_name: Internet total tax
    description: Total tax amount for internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.TaxAmt)
    default_alias: internet_total_tax
    semantic_type: money
    synonyms:
      - internet tax
      - sales tax
      - tax amount

  - name: internet_total_freight
    business_name: Internet total freight
    description: Total freight amount for internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.Freight)
    default_alias: internet_total_freight
    semantic_type: money
    synonyms:
      - freight
      - shipping cost
      - internet shipping cost

  - name: internet_total_product_cost
    business_name: Internet total product cost
    description: Total product cost for internet sales.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.TotalProductCost)
    default_alias: internet_total_product_cost
    semantic_type: money
    synonyms:
      - internet cost
      - product cost
      - total cost

  - name: internet_gross_margin
    business_name: Internet gross margin
    description: Internet sales revenue minus total product cost.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: SUM(f.SalesAmount - f.TotalProductCost)
    default_alias: internet_gross_margin
    semantic_type: money
    synonyms:
      - internet margin
      - gross margin
      - profit
      - sales profit

  - name: internet_gross_margin_pct
    business_name: Internet gross margin percent
    description: Internet gross margin divided by internet sales revenue.
    domain: sales
    subject_area: internet_sales
    base_table: dbo.FactInternetSales
    expression: CASE WHEN SUM(f.SalesAmount) = 0 THEN NULL ELSE SUM(f.SalesAmount - f.TotalProductCost) / SUM(f.SalesAmount) END
    default_alias: internet_gross_margin_pct
    semantic_type: percentage
    synonyms:
      - margin percentage
      - gross margin percentage
      - profitability rate


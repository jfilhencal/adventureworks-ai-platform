  - name: average_tenure_years
    business_name: Average tenure in years
    description: Average employee tenure in years for current employees.
    domain: workforce
    subject_area: employee_profile
    base_table: dbo.DimEmployee
    expression: AVG(DATEDIFF(day, e.HireDate, GETDATE()) / 365.25)
    default_alias: average_tenure_years
    semantic_type: numeric
    suggested_filter: CurrentFlag = 1
    synonyms:
      - tenure
      - average tenure
      - years at company
      - employee tenure

